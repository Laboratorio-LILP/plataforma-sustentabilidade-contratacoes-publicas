{% comment %}
Barra superior do Governo de SP — Decreto Estadual 69.056/2024.
Réplica funcional de saopaulo.sp.gov.br. Logo, redes sociais e controles
de acessibilidade (A+, A-, alto contraste).
{% endcomment %}
{% load static %}
<div class="sp-barra-govsp" role="region" aria-label="Barra do Governo de São Paulo">
  <div class="sp-barra-govsp__inner">
    <a class="sp-barra-govsp__logo"
       href="https://www.saopaulo.sp.gov.br/"
       target="_blank" rel="noopener noreferrer"
       aria-label="Portal do Governo do Estado de São Paulo">
      <img src="{% static 'img/logos/governo-sp/logo-governo-sp-branco.png' %}"
           alt="Governo do Estado de São Paulo"
           width="206" height="38"
           loading="eager" decoding="async" fetchpriority="high">
    </a>

    <ul class="sp-barra-govsp__redes" aria-label="Redes sociais oficiais do Governo de SP">
      <li><a href="https://www.facebook.com/governosp/" target="_blank" rel="noopener noreferrer" aria-label="Facebook do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-facebook"/></svg></a></li>
      <li><a href="https://www.instagram.com/governosp/" target="_blank" rel="noopener noreferrer" aria-label="Instagram do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-instagram"/></svg></a></li>
      <li><a href="https://www.twitter.com/governosp/" target="_blank" rel="noopener noreferrer" aria-label="Twitter/X do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-twitter"/></svg></a></li>
      <li><a href="https://www.linkedin.com/company/governosp/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-linkedin"/></svg></a></li>
      <li><a href="https://www.youtube.com/governosp/" target="_blank" rel="noopener noreferrer" aria-label="YouTube do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-youtube"/></svg></a></li>
      <li><a href="https://www.tiktok.com/@governosp" target="_blank" rel="noopener noreferrer" aria-label="TikTok do Governo de SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-tiktok"/></svg></a></li>
      <li><a href="https://compras.sp.gov.br/" target="_blank" rel="noopener noreferrer" aria-label="Portal de Compras SP"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-externo"/></svg></a></li>
    </ul>

    <div class="sp-a11y-controls" role="group" aria-label="Controles de acessibilidade">
      <button type="button" class="sp-a11y-btn" data-a11y-action="font-up" aria-label="Aumentar tamanho da fonte" title="Aumentar fonte"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-a-mais"/></svg></button>
      <button type="button" class="sp-a11y-btn" data-a11y-action="font-down" aria-label="Diminuir tamanho da fonte" title="Diminuir fonte"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-a-menos"/></svg></button>
      <button type="button" class="sp-a11y-btn" data-a11y-action="contrast" aria-pressed="false" aria-label="Alternar alto contraste" title="Alto contraste"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-contraste"/></svg></button>
      <a class="sp-a11y-btn"
         href="https://www.saopaulo.sp.gov.br/fale-conosco/comunicar-erros/"
         target="_blank" rel="noopener noreferrer"
         aria-label="Comunicar erros" title="Comunicar erros"><svg class="sp-icon" aria-hidden="true" focusable="false"><use href="#icon-alerta"/></svg></a>
    </div>
  </div>
</div>
