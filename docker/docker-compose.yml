name: lilp-pescp

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pescp}
      POSTGRES_USER: ${POSTGRES_USER:-pescp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (sem fallback — padrão LILP)}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Loopback-only no host (convenção LILP): o banco não fica exposto à rede.
      # Porta de host 5433 para coexistir com a BDLP (5432).
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pescp} -d ${POSTGRES_DB:-pescp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-pescp.settings.dev}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?defina DJANGO_SECRET_KEY no .env (sem fallback — padrão LILP)}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-pescp}
      POSTGRES_USER: ${POSTGRES_USER:-pescp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (sem fallback — padrão LILP)}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      PESCP_PUBLIC_URL: ${PESCP_PUBLIC_URL:-http://localhost:8002}
      PESCP_CONTATO_EMAIL: ${PESCP_CONTATO_EMAIL:-lab.sggd@sp.gov.br}
    volumes:
      - ..:/app
      - media:/app/media
      - staticfiles:/app/staticfiles
    ports:
      # Loopback-only no host (convenção LILP / ADR-0008 da BDLP).
      # Porta de host 8002 para coexistir com a BDLP (portal 8000, nourau 8080).
      - "127.0.0.1:${PESCP_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
  staticfiles:
